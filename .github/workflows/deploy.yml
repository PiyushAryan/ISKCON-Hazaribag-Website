name: Deploy to S3

on:
  push:
    branches:
      - main          # deploy on every push to main
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. Install dependencies
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 4. Build production bundle
      - name: Build
        run: bun run build

      # 5. Configure AWS credentials (stored as GitHub Secrets)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # 6. Sync dist/ to S3
      #    --delete removes files in S3 that no longer exist in dist/
      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "manifest.webmanifest" \
            --exclude "sw.js" \
            --exclude "registerSW.js" \
            --exclude "workbox-*.js"

          # Upload HTML + PWA files with no-cache so browsers always get the latest
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --include "index.html" \
            --include "manifest.webmanifest" \
            --include "sw.js" \
            --include "registerSW.js" \
            --exclude "*" \
            --cache-control "no-cache, no-store, must-revalidate"

          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --include "workbox-*.js" \
            --exclude "*" \
            --cache-control "no-cache, no-store, must-revalidate"

      # 7. Invalidate CloudFront cache (skip if you don't use CloudFront)
      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
